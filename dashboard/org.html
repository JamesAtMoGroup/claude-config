<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Studio — Agent Org Chart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #000;
  --green: #7cffb2;
  --green-dim: rgba(124,255,178,0.1);
  --green-line: rgba(124,255,178,0.25);
  --yellow: #ffd166;
  --purple: #b794f4;
  --purple-dim: rgba(183,148,244,0.1);
  --gold: #ffd700;
  --gold-dim: rgba(255,215,0,0.1);
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text-1: #fff;
  --text-2: rgba(255,255,255,0.55);
  --text-3: rgba(255,255,255,0.28);
  --panel-w: 380px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background ── */
.orb { position:fixed; border-radius:50%; filter:blur(130px); pointer-events:none; z-index:0; }
.orb-1 { width:700px; height:700px; background:rgba(124,255,178,0.04); top:-200px; right:-200px; }
.orb-2 { width:500px; height:500px; background:rgba(183,148,244,0.04); bottom:-150px; left:-150px; }

/* ── Layout ── */
.chart-wrap {
  position: relative;
  z-index: 1;
  padding: 48px 32px 80px;
  min-height: 100vh;
  transition: padding-right 0.4s cubic-bezier(0.4,0,0.2,1);
}
.chart-wrap.panel-open { padding-right: calc(var(--panel-w) + 32px); }

/* ── Node cards ── */
.node {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative;
  user-select: none;
  min-width: 140px;
  max-width: 180px;
}
.node:hover {
  background: var(--card-hover);
  transform: translateY(-2px);
}
.node.active {
  border-color: var(--green);
  box-shadow: 0 0 20px rgba(124,255,178,0.15);
}

/* Tier styles */
.node.tier-owner {
  background: var(--gold-dim);
  border-color: rgba(255,215,0,0.3);
  min-width: 180px;
  padding: 16px 20px;
}
.node.tier-owner:hover { border-color: rgba(255,215,0,0.6); }
.node.tier-owner.active { border-color: var(--gold); box-shadow: 0 0 24px rgba(255,215,0,0.2); }

.node.tier-meta {
  background: var(--purple-dim);
  border-color: rgba(183,148,244,0.2);
}
.node.tier-meta:hover { border-color: rgba(183,148,244,0.5); }
.node.tier-meta.active { border-color: var(--purple); box-shadow: 0 0 20px rgba(183,148,244,0.2); }

.node.tier-director {
  background: var(--green-dim);
  border-color: rgba(124,255,178,0.2);
}
.node.tier-director:hover { border-color: rgba(124,255,178,0.5); }
.node.tier-director.active { border-color: var(--green); }

.node.tier-sub {
  min-width: 120px;
  max-width: 160px;
  padding: 10px 13px;
  border-radius: 10px;
}

.node-emoji { font-size: 18px; margin-bottom: 6px; }
.node.tier-sub .node-emoji { font-size: 14px; margin-bottom: 4px; }
.node.tier-owner .node-emoji { font-size: 22px; }

.node-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1.2;
}
.node.tier-sub .node-name { font-size: 12px; }
.node.tier-owner .node-name { font-size: 15px; }

.node-sub {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  margin-top: 3px;
  letter-spacing: 0.05em;
}

/* ── Tree structure ── */
.tree {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Level rows */
.level-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  position: relative;
}

/* Connector */
.connector-v {
  width: 1px;
  background: var(--green-line);
  margin: 0 auto;
}
.connector-v.short { height: 24px; }
.connector-v.med { height: 32px; }

/* Horizontal connector bar */
.h-bar-wrap {
  display: flex;
  align-items: flex-start;
  position: relative;
}

.h-bar {
  position: absolute;
  top: 0;
  left: 50%;
  right: 50%;
  height: 1px;
  background: var(--green-line);
  transform: translateY(0);
}

/* Column with its children */
.col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 8px;
}

.col-children {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  position: relative;
}

/* Branch connector from parent to children */
.branch {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.branch-line {
  width: 1px;
  height: 20px;
  background: var(--green-line);
}

.branch-h {
  height: 1px;
  background: var(--green-line);
  align-self: stretch;
}

.child-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 6px;
}

.child-drop {
  width: 1px;
  height: 16px;
  background: var(--green-line);
}

/* Directors row special layout */
.directors-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

.directors-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  position: relative;
  width: 100%;
}

.director-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 10px;
  flex: 1;
  min-width: 0;
}

.subs-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  flex-wrap: nowrap;
}

/* Top connecting line from James to meta row */
.top-split {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  position: relative;
}

/* ── Detail Panel ── */
.panel {
  position: fixed;
  top: 0;
  right: 0;
  width: var(--panel-w);
  height: 100vh;
  background: rgba(10,10,10,0.97);
  border-left: 1px solid var(--border);
  backdrop-filter: blur(30px);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
  padding: 32px 28px 48px;
}
.panel.open { transform: translateX(0); }

.panel-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 32px; height: 32px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  font-size: 16px;
  transition: background 0.2s, color 0.2s;
}
.panel-close:hover { background: var(--card-hover); color: var(--text-1); }

.panel-emoji { font-size: 32px; margin-bottom: 12px; }
.panel-tier-badge {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 999px;
  display: inline-block;
  margin-bottom: 10px;
}
.panel-tier-badge.tier-owner { background: var(--gold-dim); color: var(--gold); }
.panel-tier-badge.tier-meta { background: var(--purple-dim); color: var(--purple); }
.panel-tier-badge.tier-director { background: var(--green-dim); color: var(--green); }
.panel-tier-badge.tier-sub { background: var(--card); color: var(--text-2); }

.panel-name {
  font-size: 22px;
  font-weight: 900;
  color: var(--text-1);
  margin-bottom: 4px;
}
.panel-subtitle {
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 24px;
  font-family: 'Space Mono', monospace;
}

.panel-section { margin-bottom: 22px; }
.panel-section-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}

.panel-list { display: flex; flex-direction: column; gap: 8px; }
.panel-list-item {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.55;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.panel-list-item::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  margin-top: 7px;
}

.panel-trigger {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.panel-trigger-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.panel-trigger-text {
  font-size: 13px;
  color: var(--text-1);
  font-weight: 500;
}

.panel-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.panel-tool {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  background: rgba(124,255,178,0.07);
  border: 1px solid rgba(124,255,178,0.15);
  color: var(--green);
  padding: 4px 10px;
  border-radius: 6px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* Header */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.header-hint {
  font-size: 12px;
  color: var(--text-3);
}

.chart-wrap { padding-top: 80px; }
</style>
</head>
<body>

<div class="chart-wrap" id="chart-wrap">

// ── Hierarchy ──────────────────────────────────────────────────────────────

const HIERARCHY = {
  james:              ['systemDirector','pmDirector','videoDirector','courseDirector','engineeringDirector','contentDirector'],
  systemDirector:     ['memoryAgent','sopAgent','syncAgent','orchestrator','onboardingAgent'],
  pmDirector:         ['videoPM','coursePM','engineeringPM','contentPM'],
  videoDirector:      ['audioAgent','transcriptionAgent','sceneDevAgent','qaAgentVideo','renderAgent','assetAgent','htmlAnalysisAgent'],
  courseDirector:     ['contentAgent','knowledgeAgent','deployAgent'],
  engineeringDirector:['backendAgent','frontendAgent','qaAgentEng'],
  contentDirector:    ['researchAgent','scriptAgent','handoffAgent'],
};

// ── Render Panel ───────────────────────────────────────────────────────────

let activeNode = null;

function openPanel(id) {
  const a = AGENTS[id];
  if (!a) return;

  // Update active state
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.getElementById('node-' + id)?.classList.add('active');
  activeNode = id;

  const tierLabel = { owner:'Studio Owner', meta:'Meta Layer', director:'Domain Director', sub:'Sub-Agent' };

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-emoji">${a.emoji}</div>
    <div class="panel-tier-badge tier-${a.tier}">${tierLabel[a.tier]}</div>
    <div class="panel-name">${a.name}</div>
    <div class="panel-subtitle">${a.subtitle}</div>

    <div class="panel-section">
      <div class="panel-trigger">
        <div class="panel-trigger-label">啟動條件</div>
        <div class="panel-trigger-text">${a.trigger}</div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">工作內容</div>
      <div class="panel-list">
        ${a.responsibilities.map(r => `<div class="panel-list-item">${r}</div>`).join('')}
      </div>
    </div>

    ${a.tools.length ? `
    <div class="panel-section">
      <div class="panel-section-title">使用工具</div>
      <div class="panel-tools">
        ${a.tools.map(t => `<span class="panel-tool">${t}</span>`).join('')}
      </div>
    </div>` : ''}

    ${a.note ? `<div class="panel-section"><div class="divider"></div><div style="font-size:12px;color:var(--text-3);line-height:1.6">${a.note}</div></div>` : ''}
  `;

  document.getElementById('panel').classList.add('open');
  document.getElementById('chart-wrap').classList.add('panel-open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('chart-wrap').classList.remove('panel-open');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  activeNode = null;
}

// ── Build org chart ────────────────────────────────────────────────────────

function makeNode(id) {
  const a = AGENTS[id];
  return `
    <div class="node tier-${a.tier}" id="node-${id}" onclick="openPanel('${id}')">
      <div class="node-emoji">${a.emoji}</div>
      <div class="node-name">${a.name}</div>
      <div class="node-sub">${a.subtitle}</div>
    </div>`;
}

function vLine(h = 24) {
  return `<div class="connector-v" style="height:${h}px"></div>`;
}

function buildSubGroup(parentId) {
  const children = HIERARCHY[parentId] || [];
  if (!children.length) return '';

  const childNodes = children.map(cid => `
    <div class="child-col">
      <div class="child-drop"></div>
      ${makeNode(cid)}
    </div>`).join('');

  // Horizontal bar spanning children
  return `
    <div style="display:flex;flex-direction:column;align-items:center">
      <div style="width:1px;height:16px;background:var(--green-line)"></div>
      <div style="display:flex;align-items:flex-start;position:relative">
        <div style="position:absolute;top:0;left:calc(50% / ${children.length});right:calc(50% / ${children.length});height:1px;background:var(--green-line)"></div>
        ${childNodes}
      </div>
    </div>`;
}

function buildDirectorCol(id) {
  const children = HIERARCHY[id] || [];
  const childNodes = children.map(cid => `
    <div class="child-col">
      <div class="child-drop" style="height:14px"></div>
      ${makeNode(cid)}
    </div>`).join('');

  return `
    <div class="director-col">
      ${makeNode(id)}
      ${children.length ? `
        <div style="width:1px;height:18px;background:var(--green-line)"></div>
        <div style="display:flex;position:relative;justify-content:center">
          ${children.length > 1 ? `<div style="position:absolute;top:0;left:14px;right:14px;height:1px;background:var(--green-line)"></div>` : ''}
          <div style="display:flex;gap:0">${childNodes}</div>
        </div>` : ''}
    </div>`;
}

function buildMetaGroup(ids) {
  // System Director + PM Director side by side
  return ids.map(id => {
    const children = HIERARCHY[id] || [];
    const childNodes = children.map(cid => `
      <div class="child-col">
        <div class="child-drop" style="height:14px"></div>
        ${makeNode(cid)}
      </div>`).join('');
    return `
      <div style="display:flex;flex-direction:column;align-items:center;padding:0 20px">
        ${makeNode(id)}
        ${children.length ? `
          <div style="width:1px;height:18px;background:var(--green-line)"></div>
          <div style="display:flex;position:relative;justify-content:center">
            ${children.length > 1 ? `<div style="position:absolute;top:0;left:14px;right:14px;height:1px;background:var(--green-line)"></div>` : ''}
            <div style="display:flex;gap:0">${childNodes}</div>
          </div>` : ''}
      </div>`;
  }).join(`<div style="width:1px;min-height:100%;background:transparent;margin:0 8px"></div>`);
}

function buildChart() {
  const directors = ['videoDirector','courseDirector','engineeringDirector','contentDirector'];
  const meta = ['systemDirector','pmDirector'];

  const html = `
    <!-- James -->
    <div style="display:flex;flex-direction:column;align-items:center">
      ${makeNode('james')}
      ${vLine(28)}

      <!-- Split to meta + domain -->
      <div style="display:flex;flex-direction:column;align-items:center;width:100%">

        <!-- Meta layer: System + PM -->
        <div style="display:flex;align-items:flex-start;justify-content:center;gap:0;position:relative;margin-bottom:0">
          <!-- horizontal bar between meta nodes -->
          <div style="position:absolute;top:0;left:25%;right:25%;height:1px;background:var(--green-line)"></div>
          ${buildMetaGroup(meta)}
        </div>

        ${vLine(28)}

        <!-- Divider label -->
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text-3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px">Domain Directors</div>

        <!-- Domain Directors row -->
        <div style="display:flex;align-items:flex-start;justify-content:center;gap:0;position:relative;width:100%">
          <!-- Horizontal bar across all directors -->
          <div style="position:absolute;top:0;left:calc(100%/${directors.length}/2);right:calc(100%/${directors.length}/2);height:1px;background:var(--green-line)"></div>
          ${directors.map(id => buildDirectorCol(id)).join('')}
        </div>
      </div>
    </div>
  `;

  document.getElementById('tree').innerHTML = html;
}

buildChart();

// Close panel on bg click
document.getElementById('chart-wrap').addEventListener('click', (e) => {
  if (e.target === document.getElementById('chart-wrap') || e.target === document.getElementById('tree')) {
    closePanel();
  }
});
</script>
