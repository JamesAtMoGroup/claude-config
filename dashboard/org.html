<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Studio — Agent Org Chart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #000;
  --green: #7cffb2;
  --green-dim: rgba(124,255,178,0.08);
  --green-line: rgba(124,255,178,0.3);
  --yellow: #ffd166;
  --purple: #b794f4;
  --purple-dim: rgba(183,148,244,0.08);
  --gold: #ffd700;
  --gold-dim: rgba(255,215,0,0.08);
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.08);
  --t1: #fff;
  --t2: rgba(255,255,255,0.55);
  --t3: rgba(255,255,255,0.28);
  --panel-w: 360px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--t1);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
}

/* ── Orbs ── */
.orb { position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; }
.orb-1 { width:600px;height:600px;background:rgba(124,255,178,0.04);top:-200px;right:-200px; }
.orb-2 { width:400px;height:400px;background:rgba(183,148,244,0.04);bottom:-100px;left:-100px; }

/* ── Header ── */
header {
  position: fixed; top:0; left:0; right:0; z-index:200;
  height: 52px;
  display: flex; align-items:center; justify-content:space-between;
  padding: 0 24px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-title { font-family:'Space Mono',monospace; font-size:11px; color:var(--t3); letter-spacing:.1em; text-transform:uppercase; }
.zoom-controls { display:flex; gap:6px; align-items:center; }
.zoom-btn {
  width:28px; height:28px;
  background: var(--card); border:1px solid var(--border);
  border-radius:7px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:'Space Mono',monospace; font-size:14px; color:var(--t2);
  transition: background .15s, color .15s;
}
.zoom-btn:hover { background:var(--card-hover); color:var(--t1); }
.zoom-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--t3); min-width:36px; text-align:center; }
.hint { font-size:11px; color:var(--t3); }

/* ── Canvas (scrollable viewport) ── */
.canvas {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  overflow: auto;
  z-index: 1;
  transition: right .35s cubic-bezier(.4,0,.2,1);
}
.canvas.panel-open { right: var(--panel-w); }

/* ── Chart inner (scalable) ── */
.chart-inner {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 60px 80px;
  transform-origin: top center;
  min-width: max-content;
}

/* ── Nodes ── */
.node {
  display: inline-flex; flex-direction:column; align-items:flex-start;
  background: var(--card); border:1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
  cursor: pointer; user-select:none;
  transition: background .15s, border-color .15s, transform .12s, box-shadow .15s;
  min-width: 130px; max-width: 170px;
  white-space: nowrap;
}
.node:hover { background:var(--card-hover); transform:translateY(-2px); }
.node.active { box-shadow:0 0 18px rgba(124,255,178,.2); }

.node.owner { background:var(--gold-dim); border-color:rgba(255,215,0,.25); min-width:160px; padding:14px 18px; }
.node.owner:hover { border-color:rgba(255,215,0,.5); }
.node.owner.active { border-color:var(--gold); }

.node.meta { background:var(--purple-dim); border-color:rgba(183,148,244,.2); }
.node.meta:hover { border-color:rgba(183,148,244,.5); }
.node.meta.active { border-color:var(--purple); box-shadow:0 0 18px rgba(183,148,244,.2); }

.node.director { background:var(--green-dim); border-color:rgba(124,255,178,.18); }
.node.director:hover { border-color:rgba(124,255,178,.5); }
.node.director.active { border-color:var(--green); }

.node.sub { min-width:110px; max-width:148px; padding:8px 11px; border-radius:9px; }

.node-emoji { font-size:16px; margin-bottom:4px; }
.node.owner .node-emoji { font-size:20px; }
.node.sub .node-emoji { font-size:13px; }
.node-name { font-size:12px; font-weight:700; color:var(--t1); line-height:1.2; }
.node.owner .node-name { font-size:14px; }
.node.sub .node-name { font-size:11px; }
.node-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--t3); margin-top:2px; }

/* Toggle indicator on directors */
.node.director::after {
  content: '▾';
  position: absolute; bottom:6px; right:10px;
  font-size:9px; color:var(--t3);
  transition: transform .2s;
}
.node.director { position:relative; }
.node.director.expanded::after { transform: rotate(180deg); }

/* ── Lines ── */
.v-line { width:1px; background:var(--green-line); margin:0 auto; }
.h-line { height:1px; background:var(--green-line); }

/* ── Layout helpers ── */
.row { display:flex; align-items:flex-start; justify-content:center; }
.col { display:flex; flex-direction:column; align-items:center; }

/* Director group (node + collapsible subs) */
.dir-group { display:flex; flex-direction:column; align-items:center; padding:0 10px; }

/* Sub-agents container */
.subs-wrap {
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition: max-height .35s cubic-bezier(.4,0,.2,1), opacity .25s;
}
.subs-wrap.open { max-height:600px; opacity:1; }

.subs-row { display:flex; align-items:flex-start; justify-content:center; position:relative; }
.sub-col { display:flex; flex-direction:column; align-items:center; padding:0 5px; }

/* ── Detail Panel ── */
.panel {
  position:fixed; top:52px; right:0; bottom:0;
  width:var(--panel-w);
  background:rgba(8,8,8,.97);
  border-left:1px solid var(--border);
  backdrop-filter:blur(30px);
  z-index:150;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
  padding:28px 24px 60px;
}
.panel.open { transform:translateX(0); }

.panel-close {
  position:absolute; top:16px; right:16px;
  width:28px; height:28px;
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--t2); font-size:14px;
  transition:background .15s;
}
.panel-close:hover { background:var(--card-hover); color:var(--t1); }

.p-emoji { font-size:28px; margin-bottom:10px; }
.p-badge {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.1em;
  text-transform:uppercase; padding:3px 10px; border-radius:999px;
  display:inline-block; margin-bottom:8px;
}
.p-badge.owner { background:var(--gold-dim); color:var(--gold); }
.p-badge.meta { background:var(--purple-dim); color:var(--purple); }
.p-badge.director { background:var(--green-dim); color:var(--green); }
.p-badge.sub { background:var(--card); color:var(--t3); border:1px solid var(--border); }

.p-name { font-size:20px; font-weight:900; margin-bottom:3px; }
.p-subtitle { font-family:'Space Mono',monospace; font-size:11px; color:var(--t2); margin-bottom:20px; }

.p-section { margin-bottom:18px; }
.p-label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:8px; }

.p-trigger { background:var(--card); border:1px solid var(--border); border-radius:9px; padding:10px 12px; }
.p-trigger .p-label { margin-bottom:4px; }
.p-trigger-text { font-size:13px; color:var(--t1); font-weight:500; }

.p-list { display:flex; flex-direction:column; gap:7px; }
.p-item { font-size:12px; color:var(--t2); line-height:1.55; display:flex; gap:9px; align-items:flex-start; }
.p-item::before { content:''; width:3px; height:3px; border-radius:50%; background:var(--green); flex-shrink:0; margin-top:6px; }

.p-tools { display:flex; flex-wrap:wrap; gap:5px; }
.p-tool { font-family:'Space Mono',monospace; font-size:10px; background:rgba(124,255,178,.06); border:1px solid rgba(124,255,178,.14); color:var(--green); padding:3px 9px; border-radius:5px; }

.p-note { font-size:11px; color:var(--t3); line-height:1.6; padding-top:14px; border-top:1px solid var(--border); margin-top:4px; }
</style>
</head>

  handoffAgent:{
    name:'Handoff', sub:'Content Director Sub', emoji:'↗️', tier:'sub',
    trigger:'Script Agent 完成後',
    resp:['將 article-YYYY-MM-DD.md 交給 Video Director','Video Director 從這裡接手完成整個影片製作'],
    tools:['→ Video Director']
  },
};

const TREE = {
  james: ['systemDirector','pmDirector','videoDirector','courseDirector','engineeringDirector','contentDirector'],
  systemDirector: ['memoryAgent','sopAgent','syncAgent','orchestrator','onboardingAgent'],
  pmDirector: ['videoPM','coursePM','engineeringPM','contentPM'],
  videoDirector: ['audioAgent','transcriptionAgent','sceneDevAgent','qaAgentVideo','renderAgent','assetAgent','htmlAnalysisAgent'],
  courseDirector: ['contentAgent','knowledgeAgent','deployAgent'],
  engineeringDirector: ['backendAgent','frontendAgent','qaAgentEng'],
  contentDirector: ['researchAgent','scriptAgent','handoffAgent'],
};

// ── Build chart ───────────────────────────────────────────────────────────

function nodeEl(id) {
  const a = A[id];
  const el = document.createElement('div');
  el.className = `node ${a.tier}`;
  el.id = 'n-' + id;
  el.innerHTML = `<div class="node-emoji">${a.emoji}</div><div class="node-name">${a.name}</div><div class="node-sub">${a.sub}</div>`;
  el.onclick = (e) => { e.stopPropagation(); handleClick(id); };
  return el;
}

function vLine(h) {
  const d = document.createElement('div');
  d.className = 'v-line'; d.style.height = h + 'px';
  return d;
}

function hLine(pct) {
  const d = document.createElement('div');
  d.className = 'h-line';
  d.style.cssText = `position:absolute;top:0;left:${pct[0]};right:${pct[1]};`;
  return d;
}

function col(...els) {
  const d = document.createElement('div'); d.className = 'col';
  els.forEach(e => e && d.appendChild(e)); return d;
}

function row(...els) {
  const d = document.createElement('div'); d.className = 'row';
  els.forEach(e => e && d.appendChild(e)); return d;
}

function buildSubsRow(ids) {
  const wrap = document.createElement('div');
  wrap.className = 'subs-wrap'; wrap.style.position = 'relative';

  const r = document.createElement('div');
  r.className = 'subs-row';

  ids.forEach((id, i) => {
    const sc = document.createElement('div'); sc.className = 'sub-col';
    const drop = document.createElement('div'); drop.className = 'v-line'; drop.style.height = '14px';
    sc.appendChild(drop); sc.appendChild(nodeEl(id));
    r.appendChild(sc);
  });

  if (ids.length > 1) {
    const bar = document.createElement('div');
    bar.style.cssText = 'position:absolute;top:0;left:14px;right:14px;height:1px;background:var(--green-line);';
    wrap.appendChild(bar);
  }

  wrap.appendChild(r);
  return wrap;
}

function buildDirectorGroup(id) {
  const children = TREE[id] || [];
  const g = document.createElement('div'); g.className = 'dir-group';

  const n = nodeEl(id);

  if (children.length) {
    const drop = vLine(16);
    const subs = buildSubsRow(children);
    subs.id = 'subs-' + id;

    // Director click: toggle subs AND open panel
    n.onclick = (e) => {
      e.stopPropagation();
      const isExpanded = n.classList.contains('expanded');
      n.classList.toggle('expanded');
      subs.classList.toggle('open');
      openPanel(id);
    };

    g.appendChild(n); g.appendChild(drop); g.appendChild(subs);
  } else {
    g.appendChild(n);
  }
  return g;
}

function buildMetaGroup(ids) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:flex-start;justify-content:center;position:relative;';

  // horizontal bar between meta nodes
  const bar = document.createElement('div');
  bar.style.cssText = 'position:absolute;top:0;left:25%;right:25%;height:1px;background:var(--green-line);';
  wrap.appendChild(bar);

  ids.forEach(id => {
    const children = TREE[id] || [];
    const g = document.createElement('div');
    g.style.cssText = 'display:flex;flex-direction:column;align-items:center;padding:0 24px;';

    g.appendChild(nodeEl(id));

    if (children.length) {
      g.appendChild(vLine(16));
      const subs = buildSubsRow(children);
      subs.id = 'subs-' + id;
      // meta director click: toggle subs
      document.getElementById?.('n-' + id);
      g.appendChild(subs);

      // re-attach click after appending
      const metaNode = g.querySelector('.node');
      metaNode.onclick = (e) => {
        e.stopPropagation();
        metaNode.classList.toggle('expanded');
        subs.classList.toggle('open');
        openPanel(id);
      };
    }

    wrap.appendChild(g);
  });
  return wrap;
}

function buildChart() {
  const chart = document.getElementById('chart');
  chart.innerHTML = '';

  // James
  chart.appendChild(col(nodeEl('james'), vLine(28)));

  // Meta layer
  const metaRow = buildMetaGroup(['systemDirector','pmDirector']);
  chart.appendChild(metaRow);
  chart.appendChild(col(vLine(28)));

  // Domain label
  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-family:"Space Mono",monospace;font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;';
  lbl.textContent = 'Domain Directors';
  chart.appendChild(lbl);

  // Directors row
  const dirs = ['videoDirector','courseDirector','engineeringDirector','contentDirector'];
  const dirRow = document.createElement('div');
  dirRow.style.cssText = 'display:flex;align-items:flex-start;justify-content:center;position:relative;';
  const dirBar = document.createElement('div');
  dirBar.style.cssText = 'position:absolute;top:0;left:12%;right:12%;height:1px;background:var(--green-line);';
  dirRow.appendChild(dirBar);
  dirs.forEach(id => dirRow.appendChild(buildDirectorGroup(id)));
  chart.appendChild(dirRow);

  // Re-attach James click (after render)
  document.getElementById('n-james').onclick = (e) => { e.stopPropagation(); openPanel('james'); };

  fitZoom();
}

// ── Zoom ─────────────────────────────────────────────────────────────────

let currentScale = 1;

function zoom(delta) {
  currentScale = Math.min(1.5, Math.max(0.3, currentScale + delta));
  applyZoom();
}

function fitZoom() {
  const canvas = document.getElementById('canvas');
  const chart = document.getElementById('chart');
  // Wait for render
  requestAnimationFrame(() => {
    const cw = canvas.clientWidth - 48;
    const ch = canvas.clientHeight - 48;
    const iw = chart.scrollWidth;
    const ih = chart.scrollHeight;
    currentScale = Math.min(cw / iw, ch / ih, 1) * 0.92;
    currentScale = Math.max(0.3, currentScale);
    applyZoom();
  });
}

function applyZoom() {
  document.getElementById('chart').style.transform = `scale(${currentScale})`;
  document.getElementById('zoom-label').textContent = Math.round(currentScale * 100) + '%';
}

// ── Panel ─────────────────────────────────────────────────────────────────

function openPanel(id) {
  const a = A[id];
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  document.getElementById('n-' + id)?.classList.add('active');

  const tierLabel = { owner:'Studio Owner', meta:'Meta Layer', director:'Domain Director', sub:'Sub-Agent' };

  document.getElementById('panel-body').innerHTML = `
    <div class="p-emoji">${a.emoji}</div>
    <div class="p-badge ${a.tier}">${tierLabel[a.tier]}</div>
    <div class="p-name">${a.name}</div>
    <div class="p-subtitle">${a.sub}</div>

    <div class="p-section">
      <div class="p-trigger">
        <div class="p-label">啟動條件</div>
        <div class="p-trigger-text">${a.trigger}</div>
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">工作內容</div>
      <div class="p-list">${a.resp.map(r=>`<div class="p-item">${r}</div>`).join('')}</div>
    </div>

    ${a.tools.length ? `<div class="p-section"><div class="p-label">使用工具</div><div class="p-tools">${a.tools.map(t=>`<span class="p-tool">${t}</span>`).join('')}</div></div>` : ''}
    ${a.note ? `<div class="p-note">${a.note}</div>` : ''}
  `;

  document.getElementById('panel').classList.add('open');
  document.getElementById('canvas').classList.add('panel-open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('canvas').classList.remove('panel-open');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
}

document.getElementById('canvas').addEventListener('click', closePanel);

// ── Init ──────────────────────────────────────────────────────────────────
buildChart();
window.addEventListener('resize', fitZoom);
</script>
</body>
</html>
