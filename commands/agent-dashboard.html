<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>Agents</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --bg2: #0d0d0d;
    --surface: #111111;
    --border: rgba(255,255,255,0.06);
    --text: #f0f0f0;
    --muted: rgba(255,255,255,0.28);
    --dim: rgba(255,255,255,0.1);
    --gap: 2px;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Topbar ── */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(8,8,8,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-logo {
    font-size: 15px; font-weight: 700; letter-spacing: 5px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #fff 0%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-count {
    font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px; font-weight: 500;
  }
  .topbar-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse-green 2.5s ease-in-out infinite;
  }
  @keyframes pulse-green {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px #22c55e; }
    50% { opacity: 0.5; box-shadow: 0 0 12px #22c55e; }
  }

  /* ── Section ── */
  .section-wrap { padding: 0 0 var(--gap); }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 24px 14px 10px;
  }
  .section-label {
    font-size: 9px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,255,255,0.18);
    flex-shrink: 0;
  }
  .section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.07) 0%, transparent 100%);
  }
  .section-count {
    font-size: 9px; color: rgba(255,255,255,0.12);
    letter-spacing: 0.5px; flex-shrink: 0;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 0;
  }

  /* ── Card ── */
  .card {
    position: relative; aspect-ratio: 1/1; overflow: hidden;
    cursor: pointer; background: var(--surface);
    transition: transform 0.2s ease;
  }
  .card:active { transform: scale(0.97); }
  .card::after {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    border-radius: 0;
    border: 1px solid var(--card-accent, rgba(255,255,255,0.15));
  }
  .card:hover::after { opacity: 1; }

  /* Photo card */
  .card-photo {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .card:hover .card-photo { transform: scale(1.06); }

  /* Gradient card (sub-agents) */
  .card-gradient {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    transition: transform 0.3s ease;
    position: relative;
  }
  .card-gradient::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 30%, var(--card-accent-light, transparent) 0%, transparent 65%);
    opacity: 0.6;
  }
  .card:hover .card-gradient { transform: scale(1.08); }

  /* Overlay */
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 25%,
      rgba(0,0,0,0.05) 45%,
      rgba(0,0,0,0.55) 72%,
      rgba(0,0,0,0.85) 100%
    );
  }
  .card.sub .card-overlay {
    background: linear-gradient(
      to bottom,
      transparent 40%,
      rgba(0,0,0,0.35) 68%,
      rgba(0,0,0,0.75) 100%
    );
  }

  /* Status pulse */
  .status-dot {
    position: absolute; top: 9px; right: 9px;
    width: 7px; height: 7px; border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.5);
  }
  .status-dot::after {
    content: '';
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: inherit;
    opacity: 0;
    animation: status-pulse 3s ease-in-out infinite;
  }
  @keyframes status-pulse {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: 0.25; transform: scale(2.2); }
  }

  /* Parent badge */
  .parent-badge {
    position: absolute; top: 8px; left: 8px;
    font-size: 7px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 7px; border-radius: 3px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.4);
    max-width: 76px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border: 1px solid rgba(255,255,255,0.07);
  }

  /* Card info */
  .card-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 6px 9px 9px;
  }
  .card-name {
    font-size: 11px; font-weight: 700; color: #fff;
    line-height: 1.25; letter-spacing: 0.1px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-role {
    font-size: 8px; color: rgba(255,255,255,0.35);
    margin-top: 1px; letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Modal ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.95); z-index: 200;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .overlay.open { display: block; }

  .profile {
    max-width: 460px; margin: 0 auto; min-height: 100vh;
    background: var(--bg2);
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .profile-photo-wrap {
    position: relative; width: 100%; overflow: hidden;
  }
  .profile-photo-wrap.has-photo { aspect-ratio: 3/4; }
  .profile-photo-wrap.no-photo  { aspect-ratio: 4/3; }

  .profile-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .profile-gradient-bg {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 90px; position: relative;
  }
  .profile-photo-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
    background: linear-gradient(transparent, var(--bg2) 96%);
  }

  .close-btn {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7); font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.1); }

  .profile-name-block {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 0 20px 22px;
  }
  .profile-name { font-size: 28px; font-weight: 800; color: #fff; line-height: 1.1; letter-spacing: -0.3px; }
  .profile-subtitle { font-size: 12px; color: rgba(255,255,255,0.38); margin-top: 4px; letter-spacing: 0.5px; }

  .profile-body { padding: 0 20px 60px; }

  .domain-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 18px 0 16px; }
  .domain-tag {
    font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
    padding: 4px 10px; border-radius: 4px; text-transform: uppercase;
  }

  .profile-bio {
    font-size: 13px; color: rgba(255,255,255,0.45);
    line-height: 1.8; margin-bottom: 20px;
    font-weight: 400;
  }

  .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 20px 0; }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; overflow: hidden;
    margin-bottom: 22px;

  .stat { padding: 14px 10px; text-align: center; }
  .stat + .stat { border-left: 1px solid rgba(255,255,255,0.05); }
  .stat-num { font-size: 22px; font-weight: 700; color: #fff; }
  .stat-label { font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 3px; }

  .section-head {
    font-size: 8px; font-weight: 800; letter-spacing: 2.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.18);
    margin-bottom: 10px;
  }

  .trigger-list { margin-bottom: 20px; }
  .trigger-item {
    font-size: 12px; color: rgba(255,255,255,0.38);
    padding: 9px 12px; background: rgba(255,255,255,0.03);
    border-radius: 7px; margin-bottom: 4px;
    border-left: 2px solid var(--t-accent, #333);
    line-height: 1.5;

  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
  .chip {
    font-size: 11px; padding: 4px 11px; border-radius: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.35);
  }
  .chip.accent {
    background: color-mix(in srgb, var(--t-accent, #555) 12%, transparent);
    border-color: color-mix(in srgb, var(--t-accent, #555) 20%, transparent);
    color: var(--t-accent, #888);
  }
</style>
</head>

// ── Render ────────────────────────────────────────────────────
function gradientBg(accent) {
  return `background: linear-gradient(145deg,
    color-mix(in srgb, ${accent} 22%, #111) 0%,
    color-mix(in srgb, ${accent} 8%, #0d0d0d) 60%,
    #0a0a0a 100%)`;
}

function cardHTML(a) {
  const isSub = a.type === 'sub';
  const accentLight = `color-mix(in srgb, ${a.accent} 30%, transparent)`;
  const inner = a.photo
    ? `<img class="card-photo" src="${a.photo}" alt="${a.name}" loading="lazy" referrerpolicy="no-referrer" crossorigin="anonymous">`
    : `<div class="card-gradient" style="${gradientBg(a.accent)}; --card-accent-light: ${accentLight}">${a.emoji}</div>`;
  const parentBadge = isSub ? `<div class="parent-badge">${a.role}</div>` : '';
  return `
    <div class="card${isSub?' sub':''}"
         style="--card-accent: color-mix(in srgb, ${a.accent} 50%, transparent)"
         onclick='openProfile(${JSON.stringify(a).replace(/'/g,"&#39;")})'>
      ${inner}
      <div class="card-overlay"></div>
      ${parentBadge}
      <div class="status-dot" style="background:${a.accent}"></div>
      <div class="card-info">
        <div class="card-name">${a.name}</div>
        <div class="card-role">${isSub ? a.role : a.domain}</div>
      </div>
    </div>
  `;
}

function render() {
  let total = 0;
  const app = document.getElementById('app');
  app.innerHTML = SECTIONS.map(sec => {
    total += sec.agents.length;
    return `
      <div class="section-wrap">
        <div class="section-header">
          <div class="section-label">${sec.label}</div>
          <div class="section-line"></div>
          <div class="section-count">${sec.agents.length}</div>
        </div>
        <div class="grid">
          ${sec.agents.map(a => cardHTML(a)).join('')}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('agent-count').textContent = total + ' agents';
}

function openProfile(a) {
  const overlay = document.getElementById('overlay');
  const profile = document.getElementById('profile');
  profile.style.setProperty('--t-accent', a.accent);

  const photoWrap = document.getElementById('p-photo-wrap');
  const photoEl = document.getElementById('p-photo');
  const gradEl  = document.getElementById('p-gradient-bg');
  if (a.photo) {
    photoWrap.className = 'profile-photo-wrap has-photo';
    photoEl.src = a.photo; photoEl.style.display = 'block';
    gradEl.style.display = 'none';
  } else {
    photoWrap.className = 'profile-photo-wrap no-photo';
    photoEl.style.display = 'none';
    gradEl.style.display = 'flex';
    gradEl.style.cssText = `display:flex; font-size:90px; align-items:center; justify-content:center; width:100%; height:100%; ${gradientBg(a.accent)}`;
    gradEl.textContent = a.emoji;
  }

  document.getElementById('p-name').textContent = a.name;
  document.getElementById('p-subtitle').textContent = a.role;

  document.getElementById('p-tags').innerHTML = `
    <span class="domain-tag" style="background:color-mix(in srgb,${a.accent} 15%,transparent);color:${a.accent};border:1px solid color-mix(in srgb,${a.accent} 25%,transparent)">${a.domain}</span>
    ${a.type==='sub'
      ? `<span class="domain-tag" style="background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.07)">SUB-AGENT</span>`
      : `<span class="domain-tag" style="background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.09)">DIRECTOR</span>`}
  `;

  document.getElementById('p-bio').textContent = a.bio;

  const subCount = a.subAgents ? a.subAgents.length : 0;
  const skillCount = a.skills ? a.skills.length : 0;
  document.getElementById('p-stats').innerHTML = `
    <div class="stat"><div class="stat-num" style="color:${a.accent}">${subCount}</div><div class="stat-label">Sub-Agents</div></div>
    <div class="stat"><div class="stat-num" style="color:${a.accent}">${skillCount}</div><div class="stat-label">Skills</div></div>
    <div class="stat"><div class="stat-num" style="color:${a.accent}">${a.triggers.length}</div><div class="stat-label">Triggers</div></div>
  `;

  document.getElementById('p-triggers').innerHTML =
    a.triggers.map(t => `<div class="trigger-item">${t}</div>`).join('');

  const subSec = document.getElementById('p-sub-section');
  if (a.subAgents && a.subAgents.length) {
    subSec.style.display = '';
    document.getElementById('p-subagents').innerHTML =
      a.subAgents.map(s => `<span class="chip accent">${s}</span>`).join('');
  } else { subSec.style.display = 'none'; }

  const skillSec = document.getElementById('p-skills-section');
  if (a.skills && a.skills.length) {
    skillSec.style.display = '';
    document.getElementById('p-skills').innerHTML =
      a.skills.map(s => `<span class="chip">${s}</span>`).join('');
  } else { skillSec.style.display = 'none'; }

  const parentSec = document.getElementById('p-parent-section');
  if (a.type === 'sub') {
    parentSec.style.display = '';
    document.getElementById('p-parent').innerHTML = `<span class="chip accent">${a.role}</span>`;
  } else { parentSec.style.display = 'none'; }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  overlay.scrollTop = 0;
}

function closeProfile() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeProfile();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProfile(); });

render();
</script>
